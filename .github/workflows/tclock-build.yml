name: Build signed TCLOCK APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build signed APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Restore signing key
        env:
          TCLOCK_KEYSTORE_BASE64: ${{ secrets.TCLOCK_KEYSTORE_BASE64 }}
        run: |
          test -n "$TCLOCK_KEYSTORE_BASE64"
          printf '%s' "$TCLOCK_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/tclock-signing.p12"

      - name: Build and test signed APK
        env:
          SIGNING_KEY_ALIAS: ${{ secrets.TCLOCK_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.TCLOCK_KEY_PASSWORD }}
          SIGNING_STORE_FILE: ${{ runner.temp }}/tclock-signing.p12
          SIGNING_STORE_PASSWORD: ${{ secrets.TCLOCK_STORE_PASSWORD }}
        run: |
          ./gradlew testFossDebugUnitTest assembleFossRelease \
            -PVERSION_CODE=${{ github.run_number }} \
            -PVERSION_NAME=1.0.${{ github.run_number }} \
            --no-daemon

      - name: Prepare public APK
        run: |
          cp app/build/outputs/apk/foss/release/*.apk "$RUNNER_TEMP/TCLOCK-latest.apk"

      - name: Publish public latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view latest >/dev/null 2>&1; then
            gh release upload latest "$RUNNER_TEMP/TCLOCK-latest.apk" --clobber
            gh release edit latest \
              --title "TCLOCK latest" \
              --notes "Signed APK built automatically from the latest main branch."
          else
            gh release create latest "$RUNNER_TEMP/TCLOCK-latest.apk" \
              --target "${{ github.sha }}" \
              --title "TCLOCK latest" \
              --notes "Signed APK built automatically from the latest main branch."
          fi
