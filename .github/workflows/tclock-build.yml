name: Build signed TCLOCK APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tclock-latest-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build signed APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Verify version advanced
        shell: bash
        run: |
          current_code="$(sed -n 's/^VERSION_CODE=//p' gradle.properties)"
          previous_code="$(git show HEAD^:gradle.properties | sed -n 's/^VERSION_CODE=//p')"
          current_name="$(sed -n 's/^VERSION_NAME=//p' gradle.properties)"
          previous_name="$(git show HEAD^:gradle.properties | sed -n 's/^VERSION_NAME=//p')"

          test -n "$current_code"
          test -n "$previous_code"
          test "$current_code" -gt "$previous_code"
          test -n "$current_name"
          test -n "$previous_name"
          test "$current_name" != "$previous_name"
          test "$(printf '%s\n%s\n' "$previous_name" "$current_name" | sort -V | tail -n 1)" = "$current_name"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Reject unsafe collection casts
        run: |
          if grep -R -n -E 'as[[:space:]]+ArrayList|toList\(\)[[:space:]]+as' app/src/main/kotlin; then
            exit 1
          fi

      - name: Restore signing key
        env:
          TCLOCK_KEYSTORE_BASE64: ${{ secrets.TCLOCK_KEYSTORE_BASE64 }}
        run: |
          test -n "$TCLOCK_KEYSTORE_BASE64"
          printf '%s' "$TCLOCK_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/tclock-signing.p12"

      - name: Run unit tests
        run: ./gradlew testFossDebugUnitTest --no-daemon

      - name: Run Detekt (advisory)
        continue-on-error: true
        run: ./gradlew detekt --no-daemon

      - name: Run Android lint
        run: ./gradlew lintFossRelease --no-daemon

      - name: Build signed APK
        env:
          SIGNING_KEY_ALIAS: ${{ secrets.TCLOCK_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.TCLOCK_KEY_PASSWORD }}
          SIGNING_STORE_FILE: ${{ runner.temp }}/tclock-signing.p12
          SIGNING_STORE_PASSWORD: ${{ secrets.TCLOCK_STORE_PASSWORD }}
        run: ./gradlew assembleFossRelease --no-daemon

      - name: Prepare public APK
        run: |
          APK_PATH="$(find app/build/outputs/apk/foss/release -maxdepth 1 -type f -name '*.apk' -print -quit)"
          test -n "$APK_PATH"
          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -type f -name apksigner -print | sort -V | tail -n 1)"
          test -x "$APKSIGNER"
          "$APKSIGNER" verify --verbose --print-certs "$APK_PATH"
          cp "$APK_PATH" "$RUNNER_TEMP/TCLOCK-latest.apk"

      - name: Publish public latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view latest >/dev/null 2>&1; then
            gh release upload latest "$RUNNER_TEMP/TCLOCK-latest.apk" --clobber
            gh release edit latest \
              --title "TCLOCK latest" \
              --notes "Signed APK built automatically from the latest main branch."
          else
            gh release create latest "$RUNNER_TEMP/TCLOCK-latest.apk" \
              --target "${{ github.sha }}" \
              --title "TCLOCK latest" \
              --notes "Signed APK built automatically from the latest main branch."
          fi
